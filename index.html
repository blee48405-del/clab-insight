<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>클랩 인사이트 | by CLAB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF5C35;
      --primary-light: #fff3f0;
      --dark: #111111;
      --gray1: #333;
      --gray2: #666;
      --gray3: #999;
      --gray4: #ccc;
      --gray5: #f5f5f5;
      --white: #ffffff;
      --border: #ebebeb;
      --radius: 14px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.13);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--white);
      color: var(--dark);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ───── 헤더 ───── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1140px; margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex; align-items: center; gap: 32px;
    }
    .logo {
      font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
      text-decoration: none; color: var(--dark);
      display: flex; align-items: center; gap: 6px;
    }
    .logo .logo-clab { color: var(--primary); }
    .logo .logo-badge {
      font-size: 10px; font-weight: 500;
      background: var(--primary); color: #fff;
      padding: 2px 7px; border-radius: 20px;
      letter-spacing: 0.5px;
    }
    nav { display: flex; gap: 4px; margin-left: auto; }
    nav a {
      font-size: 14px; font-weight: 500; color: var(--gray2);
      text-decoration: none; padding: 6px 12px; border-radius: 8px;
      transition: all 0.15s;
    }
    nav a:hover { color: var(--dark); background: var(--gray5); }
    nav a.active { color: var(--primary); background: var(--primary-light); }
    .header-cta {
      font-size: 13px; font-weight: 600;
      background: var(--primary); color: #fff;
      border: none; border-radius: 8px;
      padding: 8px 16px; cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .header-cta:hover { opacity: 0.85; }

    /* ───── 히어로 ───── */
    .hero {
      background: linear-gradient(135deg, #fff8f6 0%, #fff3ee 50%, #ffeee8 100%);
      padding: 72px 24px 64px;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: -60px; right: -60px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(255,92,53,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero::after {
      content: '';
      position: absolute; bottom: -40px; left: -40px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(255,92,53,0.06) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: var(--primary);
      letter-spacing: 1.5px; text-transform: uppercase;
      background: var(--primary-light); border: 1px solid rgba(255,92,53,0.2);
      padding: 5px 14px; border-radius: 20px; margin-bottom: 20px;
    }
    .hero-title {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 700; letter-spacing: -1.5px;
      line-height: 1.15; margin-bottom: 16px;
    }
    .hero-title em { color: var(--primary); font-style: normal; }
    .hero-desc {
      font-size: 16px; color: var(--gray2); max-width: 480px;
      margin: 0 auto 36px; line-height: 1.7;
    }
    .hero-stats {
      display: inline-flex; gap: 0;
      background: #fff; border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .hero-stat {
      padding: 18px 32px; text-align: center;
      border-right: 1px solid var(--border);
    }
    .hero-stat:last-child { border-right: none; }
    .hero-stat strong { display: block; font-size: 28px; font-weight: 700; letter-spacing: -1px; color: var(--primary); }
    .hero-stat span { font-size: 12px; color: var(--gray3); font-weight: 400; }

    /* ───── 업로드 배너 ───── */
    #upload-banner {
      max-width: 1140px; margin: 40px auto 0;
      padding: 0 24px;
    }
    .upload-zone {
      background: var(--gray5);
      border: 2px dashed var(--gray4);
      border-radius: var(--radius);
      padding: 36px 24px;
      text-align: center; cursor: pointer;
      transition: all 0.2s;
    }
    .upload-zone:hover, .upload-zone.drag {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .upload-zone .upload-icon { font-size: 36px; margin-bottom: 10px; }
    .upload-zone h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .upload-zone p { font-size: 13px; color: var(--gray3); }
    #file-input { display: none; }

    /* ───── 섹션 공통 ───── */
    .section { max-width: 1140px; margin: 0 auto; padding: 56px 24px; }
    .section-head {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 28px; gap: 16px;
    }
    .section-head .left {}
    .section-label {
      font-size: 11px; font-weight: 700; color: var(--primary);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;

      font-size: 13px; color: var(--gray3); text-decoration: none;
      display: flex; align-items: center; gap: 4px; white-space: nowrap;
      transition: color 0.15s;
    }
    .see-all:hover { color: var(--primary); }

    /* ───── 피처드 카드 (링크) ───── */
    .featured-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .article-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: all 0.2s;
      cursor: pointer;
      display: flex; flex-direction: column; gap: 12px;
    }
    .article-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
      border-color: transparent;
    }
    .card-top { display: flex; align-items: center; justify-content: space-between; }
    .sender-chip {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500;

      padding: 4px 10px;
    }
    .sender-dot {

    }
    .card-time { font-size: 11px; color: var(--gray4); }
    .domain-tag {
      display: inline-flex; align-items: center; gap: 4px;

      background: var(--primary-light); border-radius: 6px;

      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-footer {
      display: flex; align-items: center; gap: 8px; margin-top: auto;

    .clap-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--gray3);
      background: none; border: 1px solid var(--border);

      background: var(--white);

    .insight-meta { font-size: 12px; color: var(--gray4); }

    }

      display: flex; align-items: center; gap: 12px;

    .member-count { font-size: 12px; color: var(--gray3); margin-top: 2px; }

    /* ───── 미디어 ───── */
    .media-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px;
    }
    .media-card {
      background: var(--gray5); border-radius: 10px;

    }
    .media-icon { font-size: 28px; flex-shrink: 0; }
    .media-name { font-size: 13px; font-weight: 500; color: var(--gray1); }
    .media-meta { font-size: 11px; color: var(--gray3); margin-top: 3px; }

    .date-divider {
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: var(--gray3); font-weight: 500;
      margin: 24px 0 16px;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ───── 필터 탭 ───── */
    .filter-tabs {
      display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap;
    }
    .tab-btn {
      font-size: 13px; font-weight: 500;
      padding: 7px 16px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--white); color: var(--gray2);
      cursor: pointer; transition: all 0.15s;
    }
    .tab-btn:hover { border-color: var(--primary); color: var(--primary); }
    .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ───── 빈 상태 ───── */
    .empty-state {
      text-align: center; padding: 80px 24px;
      color: var(--gray3);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; font-weight: 600; color: var(--gray2); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; line-height: 1.7; }

    /* ───── 구분선 섹션 ───── */
    .divider { height: 1px; background: var(--border); max-width: 1140px; margin: 0 auto; }

    /* ───── 푸터 ───── */
    footer {
      background: var(--dark); color: rgba(255,255,255,0.5);
      padding: 48px 24px; text-align: center;
      margin-top: 80px;
    }
    .footer-logo { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .footer-logo span { color: var(--primary); }
    footer p { font-size: 13px; line-height: 1.7; }
    footer a { color: rgba(255,255,255,0.4); text-decoration: none; }
    footer a:hover { color: #fff; }

    /* ───── 반응형 ───── */
    @media (max-width: 900px) {
      .featured-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .featured-grid { grid-template-columns: 1fr; }
      .hero-stats { flex-direction: column; }
      .hero-stat { border-right: none; border-bottom: 1px solid var(--border); }
      .hero-stat:last-child { border-bottom: none; }
      nav { display: none; }
      .header-cta { display: none; }
      .section { padding: 40px 16px; }
    }

    /* ───── 인쇄/PDF ───── */
    @media print {
      header, #upload-banner, .filter-tabs, .clap-btn, footer { display: none; }
      .article-card { break-inside: avoid; }
    }

    /* ───── 애니메이션 ───── */
    .fade-in {
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }

    .card-wrapper:nth-child(3) { animation-delay: 0.10s; }
    .card-wrapper:nth-child(4) { animation-delay: 0.15s; }
    .card-wrapper:nth-child(5) { animation-delay: 0.20s; }
    .card-wrapper:nth-child(6) { animation-delay: 0.25s; }
  </style>

<script>
// ──────────────────────────────────────────────
// 파서
// ──────────────────────────────────────────────
const PALETTE = ['#FF5C35','#3B82F6','#10B981','#8B5CF6','#F59E0B','#EC4899','#06B6D4','#6366F1'];
const senderColors = {};
let colorIdx = 0;
function senderColor(name) {
  if (!senderColors[name]) senderColors[name] = PALETTE[colorIdx++ % PALETTE.length];
  return senderColors[name];
}

function parseKakao(text) {
  const lines = text.split('\n');
  const messages = [], senders = {}, dates = {};
  const MSG = /^\[(.+?)\] \[(오전|오후) (\d{1,2}):(\d{2})\] (.*)$/;
  const DATE = /[-─]+\s*(\d{4}년 \d{1,2}월 \d{1,2}일.+?)\s*[-─]+/;
  let curDate = '', lastMsg = null;

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    const dm = line.match(DATE);
    if (dm) { curDate = dm[1].trim(); if (!dates[curDate]) dates[curDate] = 0; continue; }
    const mm = line.match(MSG);
    if (mm) {
      const [, sender, ap, h, m, content] = mm;
      let hr = parseInt(h);
      if (ap === '오후' && hr !== 12) hr += 12;
      if (ap === '오전' && hr === 12) hr = 0;
      senders[sender] = (senders[sender] || 0) + 1;
      if (curDate) dates[curDate] = (dates[curDate] || 0) + 1;
      lastMsg = { sender, time: `${String(hr).padStart(2,'0')}:${m}`, date: curDate, content, type: classify(content) };
      messages.push(lastMsg);
    } else if (lastMsg && line && !line.startsWith('카카오톡')) {
      lastMsg.content += '\n' + line;
    }
  }
  return { messages, senders, dates };
}

function classify(c) {
  if (/https?:\/\//.test(c)) return 'link';
  if (/사진$|이모티콘$|동영상$|파일$|GIF$/.test(c.trim())) return 'media';
  return 'text';
}
function extractUrl(c) { const m = c.match(/https?:\/\/[^\s]+/); return m?m[0]:null; }
function domain(url) { try { return new URL(url).hostname.replace('www.',''); } catch { return ''; } }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ──────────────────────────────────────────────
// 파일 입력
// ──────────────────────────────────────────────
let parsed = null;
const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');
fileInput.addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
});
function readFile(file) {
  const r = new FileReader();
  r.onload = e => { parsed = parseKakao(e.target.result); render(parsed); };
  r.readAsText(file, 'UTF-8');
}

// ──────────────────────────────────────────────
// 렌더링
// ──────────────────────────────────────────────
function render(data) {
  const { messages, senders, dates } = data;
  const links = messages.filter(m => m.type === 'link');
  const texts = messages.filter(m => m.type === 'text' && m.content.length >= 20);
  const media = messages.filter(m => m.type === 'media');

  // 통계
  document.getElementById('stat-msg').textContent = messages.length;
  document.getElementById('stat-link').textContent = links.length;
  document.getElementById('stat-member').textContent = Object.keys(senders).length;
  document.getElementById('stat-day').textContent = Object.keys(dates).filter(d=>d).length;

  // 업로드 배너 숨김
  document.getElementById('upload-banner').style.display = 'none';

  let html = '';

  // ── 링크/아티클 섹션
  if (links.length > 0) {
    html += `
    <div class="section" id="links">
      <div class="section-head">
        <div class="left">
          <div class="section-label">Articles</div>
          <div class="section-title">공유된 링크 · 아티클 <span style="font-size:16px;color:var(--gray4);font-weight:400">${links.length}</span></div>
        </div>
      </div>
      <div class="filter-tabs" id="tab-row">
        <button class="tab-btn active" onclick="filterAll(this)">전체</button>
        ${[...new Set(links.map(m=>domain(extractUrl(m.content))).filter(Boolean))].slice(0,6).map(d=>`<button class="tab-btn" onclick="filterDomain('${d}',this)">${d}</button>`).join('')}
      </div>
      <div class="featured-grid" id="article-grid">`;

    let prevDate = '';
    links.forEach((msg, i) => {
      const url = extractUrl(msg.content);
      const comment = msg.content.replace(/https?:\/\/[^\s]+/g,'').trim();
      const nextComments = [];
      for (let j = messages.indexOf(msg)+1; j <= messages.indexOf(msg)+3 && j < messages.length; j++) {
        if (messages[j].sender === msg.sender && messages[j].type === 'text' && messages[j].content.length >= 10) {
          nextComments.push(messages[j].content); break;
        }
      }
      const col = senderColor(msg.sender);
      const dm = domain(url);
      html += `
        <div class="card-wrapper article-card-wrap" data-domain="${dm}">
          <div class="article-card">
            <div class="card-top">
              <span class="sender-chip">
                <span class="sender-dot" style="background:${col}"></span>
                ${esc(msg.sender)}
              </span>
              <span class="card-time">${msg.date ? msg.date.replace(/\d{4}년 /,'') : ''} ${msg.time}</span>
            </div>
            ${dm ? `<span class="domain-tag">🔗 ${dm}</span>` : ''}
            <a class="card-url" href="${url}" target="_blank" rel="noopener">${url}</a>
            ${comment ? `<div class="card-comment">"${esc(comment)}"</div>` : ''}
            ${nextComments.map(c=>`<div class="card-comment">"${esc(c)}"</div>`).join('')}
            <div class="card-footer">
              <button class="clap-btn" onclick="clap(this)">👏 <span class="clap-count">0</span></button>
              <button class="clap-btn" onclick="copyLink('${url}', this)">🔗 복사</button>
            </div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  }

  html += `<div class="divider"></div>`;

  // ── 인사이트 섹션
  const longTexts = texts.filter(m => m.content.length >= 20);
  if (longTexts.length > 0) {
    html += `
    <div class="section" id="insights">
      <div class="section-head">
        <div class="left">
          <div class="section-label">Insights</div>
          <div class="section-title">멤버 인사이트 <span style="font-size:16px;color:var(--gray4);font-weight:400">${longTexts.length}</span></div>
        </div>
      </div>
      <div class="insight-list">`;
    longTexts.forEach((msg, i) => {
      const col = senderColor(msg.sender);
      html += `
        <div class="insight-card fade-in">
          <div class="insight-number">${String(i+1).padStart(2,'0')}</div>
          <div class="insight-body">
            <div class="insight-text">${esc(msg.content)}</div>
            <div class="insight-meta">
              <strong style="color:${col}">${esc(msg.sender)}</strong>
              &nbsp;·&nbsp; ${msg.date ? msg.date.replace(/\d{4}년 /,'') : ''} ${msg.time}
            </div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
    html += `<div class="divider"></div>`;
  }

  // ── 참여자 섹션
  const sortedSenders = Object.entries(senders).sort((a,b)=>b[1]-a[1]);
  html += `
  <div class="section" id="members">
    <div class="section-head">
      <div class="left">
        <div class="section-label">Members</div>
        <div class="section-title">이번 호 참여자</div>
      </div>
    </div>
    <div class="members-row">`;
  sortedSenders.forEach(([name, count]) => {
    const col = senderColor(name);
    html += `
      <div class="member-card">
        <div class="avatar" style="background:${col}">${name.charAt(0)}</div>
        <div>
          <div class="member-name">${esc(name)}</div>
          <div class="member-count">메시지 ${count}개</div>
        </div>
      </div>`;
  });
  html += `</div></div>`;

  // ── 미디어 섹션
  if (media.length > 0) {
    html += `<div class="divider"></div>
    <div class="section">
      <div class="section-head">
        <div class="left">
          <div class="section-label">Media</div>
          <div class="section-title">공유된 파일 · 미디어</div>
        </div>
      </div>
      <div class="media-grid">`;
    media.forEach(msg => {
      const icon = msg.content.includes('사진')?'🖼️':msg.content.includes('동영상')?'🎬':'📎';
      const col = senderColor(msg.sender);
      html += `
        <div class="media-card">
          <span class="media-icon">${icon}</span>
          <div>
            <div class="media-name">${esc(msg.content)}</div>
            <div class="media-meta" style="color:${col}">${esc(msg.sender)} · ${msg.time}</div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  }

  document.getElementById('content-root').innerHTML = html;
}

// ──────────────────────────────────────────────
// 인터랙션
// ──────────────────────────────────────────────
function clap(btn) {
  btn.classList.toggle('clapped');
  const n = btn.querySelector('.clap-count');
  n.textContent = btn.classList.contains('clapped') ? parseInt(n.textContent)+1 : Math.max(0,parseInt(n.textContent)-1);
}
function copyLink(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    const orig = btn.textContent; btn.textContent = '✅ 복사됨';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}
function filterAll(btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.article-card-wrap').forEach(el=>el.style.display='');
}
function filterDomain(d, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.article-card-wrap').forEach(el=>{
    el.style.display = el.dataset.domain === d ? '' : 'none';
  });
}
</script>

<!-- ───── CLAB 챗봇 위젯 ───── -->
<script>
(function(){
  'use strict';
  var GAS='https://script.google.com/macros/s/AKfycbxjQ3I_mhww7wM5KKuxr3ORtGoXqrjj6WX_jN8iS9ofozqfYMfTmD2Eh0rtBzz7JJkt2w/exec';
  var s=document.createElement('style');
  s.textContent=
    '#clab-toggle{position:fixed;bottom:28px;right:28px;z-index:9999;width:56px;height:56px;border-radius:50%;background:#FF5C35;color:#fff;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(255,92,53,.45);display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform .2s}'
    +'#clab-toggle:hover{transform:scale(1.08)}'
    +'#clab-toggle .io{display:flex}#clab-toggle .ic{display:none}'
    +'#clab-toggle.open .io{display:none}#clab-toggle.open .ic{display:flex}'
    +'#clab-badge{position:fixed;bottom:92px;right:22px;z-index:10000;background:#FF5C35;color:#fff;font-size:12px;font-weight:700;border-radius:20px;padding:5px 12px;box-shadow:0 2px 10px rgba(255,92,53,.35);pointer-events:none;opacity:0;transition:opacity .4s;white-space:nowrap}'
    +'#clab-badge.show{opacity:1}'
    +'#clab-panel{position:fixed;bottom:96px;right:28px;z-index:9998;width:360px;max-height:580px;background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.18);display:flex;flex-direction:column;overflow:hidden;transform:scale(.92) translateY(12px);opacity:0;pointer-events:none;transition:transform .25s cubic-bezier(.4,0,.2,1),opacity .25s}'
    +'#clab-panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all}'
    +'@media(max-width:420px){#clab-panel{right:8px;left:8px;width:auto;bottom:88px}#clab-toggle{bottom:16px;right:16px}#clab-badge{bottom:80px;right:12px}}'
    +'.ch{background:#FF5C35;color:#fff;padding:14px 18px;flex-shrink:0;display:flex;align-items:center;gap:10px}'
    +'.ch-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:17px}'
    +'.ch h3{margin:0;font-size:15px;font-weight:700}.ch p{margin:0;font-size:11px;opacity:.85}'
    +'.cm{flex:1;overflow-y:auto;padding:14px 12px 6px;display:flex;flex-direction:column;gap:8px}'
    +'.msg{max-width:85%;font-size:14px;line-height:1.55;padding:10px 14px;border-radius:16px;word-break:break-word;white-space:pre-wrap}'
    +'.msg.bot{background:#f5f5f5;color:#222;align-self:flex-start;border-bottom-left-radius:4px}'
    +'.msg.user{background:#FF5C35;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}'
    +'.msg.done{background:#e8f8f0;color:#1a7a4a;align-self:center;text-align:center;border-radius:12px;font-size:13px;max-width:92%}'
    +'.cqr{display:flex;flex-wrap:wrap;gap:7px;padding:4px 12px 10px;flex-shrink:0}'
    +'.qb{font-size:13px;font-weight:500;padding:7px 13px;border:1.5px solid #FF5C35;border-radius:20px;color:#FF5C35;background:#fff;cursor:pointer;transition:all .15s;white-space:nowrap}'
    +'.qb:hover{background:#FF5C35;color:#fff}'
    +'.cf{border-top:1px solid #ebebeb;padding:10px 12px;flex-shrink:0}'
    +'.ci{flex:1;resize:none;border:1.5px solid #ddd;border-radius:12px;padding:9px 12px;font-size:14px;font-family:inherit;line-height:1.4;outline:none;transition:border-color .15s;min-height:40px;max-height:100px}'
    +'.ci:focus{border-color:#FF5C35}'
    +'.cs{flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#FF5C35;color:#fff;border:none;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:opacity .15s}'
    +'.cs:hover{opacity:.85}.cs:disabled{opacity:.4;cursor:default}'
    +'.hint{font-size:11px;color:#aaa;margin-bottom:5px}'
    +'.typing{display:flex;gap:4px;align-items:center;padding:10px 14px;background:#f5f5f5;border-radius:16px;border-bottom-left-radius:4px;align-self:flex-start}'
    +'.typing span{width:6px;height:6px;background:#bbb;border-radius:50%;animation:td 1.2s infinite}'
    +'.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}'
    +'@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-4px);opacity:1}}';
  document.head.appendChild(s);

  var badge=document.createElement('div');
  badge.id='clab-badge'; badge.textContent='💬 문의하기';
  var btn=document.createElement('button');
  btn.id='clab-toggle';
  btn.innerHTML='<span class="io">💬</span><span class="ic">✕</span>';
  var panel=document.createElement('div');
  panel.id='clab-panel';
  panel.innerHTML='<div class="ch"><div class="ch-av">👏</div><div><h3>CLAB 문의하기</h3><p>평일 09:00–18:00 운영 · 빠른 답변 드립니다</p></div></div><div class="cm" id="clab-m"></div><div class="cqr" id="clab-q"></div><div class="cf" id="clab-f" style="display:none"><div class="hint" id="clab-h"></div><div style="display:flex;gap:8px;align-items:flex-end"><textarea class="ci" id="clab-i" rows="1" maxlength="500"></textarea><button class="cs" id="clab-s">➤</button></div></div>';
  document.body.appendChild(badge);
  document.body.appendChild(btn);
  document.body.appendChild(panel);

  var M=document.getElementById('clab-m'),Q=document.getElementById('clab-q'),
      F=document.getElementById('clab-f'),H=document.getElementById('clab-h'),
      I=document.getElementById('clab-i'),S=document.getElementById('clab-s');
  var st={step:0,cat:'',sub:'',name:'',contact:'',msg:''};
  var sending=false,open=false;

  function addMsg(t,r){var d=document.createElement('div');d.className='msg '+r;d.textContent=t;M.appendChild(d);M.scrollTop=M.scrollHeight;}
  function showTyping(){var e=document.createElement('div');e.className='typing';e.id='clab-t';e.innerHTML='<span></span><span></span><span></span>';M.appendChild(e);M.scrollTop=M.scrollHeight;}
  function hideTyping(){var e=document.getElementById('clab-t');if(e)e.remove();}
  function botSay(t,d){return new Promise(function(r){showTyping();setTimeout(function(){hideTyping();addMsg(t,'bot');r();},d||400);});}
  function setQR(items){Q.innerHTML='';items.forEach(function(it){var b=document.createElement('button');b.className='qb';b.textContent=it.l;b.onclick=function(){onQR(it.v||it.l);};Q.appendChild(b);});}
  function clearQR(){Q.innerHTML='';}
  function showInput(h,p){F.style.display='';H.textContent=h||'';I.placeholder=p||'';I.value='';I.style.height='auto';setTimeout(function(){I.focus();},100);}
  function hideInput(){F.style.display='none';}

  async function startFlow(){
    Object.assign(st,{step:0,cat:'',sub:'',name:'',contact:'',msg:''});
    hideInput();clearQR();
    await botSay('안녕하세요! 👏 CLAB입니다.\n어떤 문의를 도와드릴까요?',500);
    setQR([{l:'📰 매거진 문의'},{l:'🤝 클랩 협업 문의'}]);
    st.step=1;
  }

  async function onQR(v){
    if(v==='__restart__'){clearQR();await startFlow();return;}
    clearQR();addMsg(v,'user');
    if(st.step===1){
      st.cat=v;
      if(v.includes('매거진')){
        await botSay('매거진 관련 문의군요!\n어떤 내용인가요?',500);
        setQR([{l:'📬 구독 신청'},{l:'📢 광고·제휴 문의'},{l:'✍️ 콘텐츠 제보'},{l:'❓ 기타 문의'}]);
      } else {
        await botSay('클랩 협업 문의군요!\n어떤 내용인가요?',500);
        setQR([{l:'🏢 기업 협업'},{l:'📝 콘텐츠 파트너'},{l:'🎉 이벤트·캠페인'},{l:'❓ 기타 문의'}]);
      }
      st.step=2;
    } else if(st.step===2){
      st.sub=v;
      await botSay('성함을 알려주세요 😊',500);
      showInput('','홍길동');
      st.step=3;
    }
  }

  async function onInput(t){
    addMsg(t,'user');I.value='';I.style.height='auto';
    if(st.step===3){
      st.name=t;
      await botSay('연락처를 남겨주세요.\n(이메일 또는 전화번호)',500);
      showInput('','example@email.com');
      st.step=4;
    } else if(st.step===4){
      st.contact=t;
      await botSay('문의 내용을 자세히 적어주세요. 📝',500);
      showInput('','궁금한 점을 자유롭게 작성해주세요…');
      st.step=5;
    } else if(st.step===5){
      st.msg=t;hideInput();
      await doSubmit();
    }
  }

  async function doSubmit(){
    sending=true;S.disabled=true;showTyping();
    try{
      await fetch(GAS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({timestamp:new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'}),
          name:st.name,category:st.cat,subCategory:st.sub,contact:st.contact,message:st.msg,page:location.href})});
      hideTyping();
      var d=document.createElement('div');d.className='msg done';
      d.textContent='✅ 문의가 접수되었습니다!\n빠른 시일 내에 연락드릴게요 😊';
      M.appendChild(d);M.scrollTop=M.scrollHeight;
      await new Promise(function(r){setTimeout(r,1000);});
      await botSay('추가 문의가 있으시면 언제든지 말씀해주세요!',400);
      setQR([{l:'🔄 새 문의하기',v:'__restart__'}]);
    } catch(e){
      hideTyping();
      addMsg('전송 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.','bot');
    } finally{sending=false;S.disabled=false;}
  }

  function go(){var t=I.value.trim();if(!t||sending)return;onInput(t);}
  S.addEventListener('click',go);
  I.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}});
  I.addEventListener('input',function(){I.style.height='auto';I.style.height=Math.min(I.scrollHeight,100)+'px';});
  btn.addEventListener('click',function(){
    open=!open;btn.classList.toggle('open',open);panel.classList.toggle('open',open);
    badge.classList.remove('show');
    if(open&&M.childElementCount===0)startFlow();
  });
  setTimeout(function(){badge.classList.add('show');},3000);
})();
</script>
